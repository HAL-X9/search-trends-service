http:
  addr: ":8080"
  timeouts:
    read_timeout: 10s
    read_header_timeout: 10s
    write_timeout: 30s
    idle_timeout: 120s
  max_header_bytes: 1048576

kafka:
  brokers:
    - "kafka:9092"
  topic: "search-logs"
  group_id: "search-trends-readers"
  client_id: "trends-service"
  auto_offset_reset: "latest"